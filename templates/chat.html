<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iMessage Bridge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
  }

  /* Sidebar */
  #sidebar {
    width: 320px;
    min-width: 320px;
    background: #222;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #333;
    font-size: 18px;
    font-weight: 600;
  }

  #chat-list {
    flex: 1;
    overflow-y: auto;
  }

  .chat-item {
    padding: 12px 16px;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer;
    transition: background 0.15s;
  }

  .chat-item:hover { background: #2a2a2a; }
  .chat-item.active { background: #333; }

  .chat-item-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chat-item-name {
    font-weight: 500;
    font-size: 14px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .chat-item.unread .chat-item-name { font-weight: 700; }
  .chat-item.unread .chat-item-preview { color: #e0e0e0; }

  .unread-badge {
    display: none;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 10px;
    background: #0b84fe;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    line-height: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .chat-item.unread .unread-badge { display: inline-block; }

  .chat-item-preview {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Main area */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #chat-header {
    padding: 16px;
    border-bottom: 1px solid #333;
    font-size: 16px;
    font-weight: 600;
    background: #222;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
  }

  .msg.from-me {
    align-self: flex-end;
    background: #0b84fe;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.from-them {
    align-self: flex-start;
    background: #333;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
  }

  .msg-sender {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 2px;
  }

  .msg-time {
    font-size: 10px;
    color: #777;
    margin-top: 2px;
  }

  .msg.from-me .msg-time { color: rgba(255,255,255,0.6); }

  .msg-status {
    font-size: 10px;
    color: #777;
    margin-top: 1px;
    text-align: right;
  }

  .msg.from-me .msg-status { color: rgba(255,255,255,0.5); }

  .msg:has(.msg-img) { max-width: 50%; }

  .msg-img {
    max-width: 100%;
    border-radius: 12px;
    margin-top: 4px;
    cursor: pointer;
  }

  .msg-file {
    display: inline-block;
    padding: 6px 10px;
    margin-top: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    font-size: 12px;
    color: #aaa;
    text-decoration: none;
  }

  .msg-file:hover { background: rgba(255,255,255,0.15); }
  .msg.from-me .msg-file { background: rgba(0,0,0,0.15); color: rgba(255,255,255,0.8); }

  /* Compose */
  #compose {
    padding: 12px 16px;
    border-top: 1px solid #333;
    background: #222;
    display: flex;
    gap: 8px;
  }

  #compose input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #444;
    border-radius: 20px;
    background: #2a2a2a;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
  }

  #compose input:focus { border-color: #0b84fe; }

  #compose button {
    padding: 10px 20px;
    background: #0b84fe;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }

  #compose button:hover { background: #0a75e0; }
  #compose button:disabled { opacity: 0.5; cursor: default; }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 16px;
  }

  /* Status indicator */
  #status {
    padding: 8px 16px;
    font-size: 11px;
    color: #666;
    border-top: 1px solid #333;
  }

  #status .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  #status .dot.connected { background: #30d158; }
  #status .dot.disconnected { background: #ff3b30; }

  /* Mobile */
  @media (max-width: 600px) {
    #sidebar { width: 100%; min-width: 100%; }
    #main { display: none; }
    body.chat-open #sidebar { display: none; }
    body.chat-open #main { display: flex; }
  }
</style>
</head>
<body>

<input type="hidden" id="ws-token" value="{{ ws_token }}">
<div id="sidebar">
  <div id="sidebar-header">iMessage</div>
  <div id="chat-list">
    {% for chat in chats %}
    <div class="chat-item" data-chat-id="{{ chat.chat_identifier }}" data-chat-style="{{ chat.style }}" data-chat-name="{{ chat.display_name }}">
      <div class="chat-item-row">
        <div class="chat-item-name">{{ chat.display_name }}</div>
        <span class="unread-badge">0</span>
      </div>
      <div class="chat-item-preview">{{ chat.last_text }}</div>
    </div>
    {% endfor %}
  </div>
  <div id="status"><span class="dot disconnected" id="status-dot"></span><span id="status-text">Connecting...</span></div>
</div>

<div id="main">
  <div id="chat-header">Select a conversation</div>
  <div id="empty-state">Select a conversation to start</div>
  <div id="messages" style="display:none"></div>
  <div id="compose" style="display:none">
    <input type="text" id="msg-input" placeholder="iMessage" autocomplete="off">
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
const state = {
  chatId: null,
  chatStyle: 45,
  chatName: '',
  ws: null,
  unread: {},  // chat_identifier -> count
  msgOffset: 0,
  loadingMore: false,
  hasMore: true,
};

// --- WebSocket ---
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsToken = document.getElementById('ws-token')?.value || '';
  const tokenParam = wsToken ? `?token=${encodeURIComponent(wsToken)}` : '';
  state.ws = new WebSocket(`${proto}//${location.host}/ws${tokenParam}`);

  state.ws.onopen = () => {
    document.getElementById('status-dot').className = 'dot connected';
    document.getElementById('status-text').textContent = 'Connected';
  };

  state.ws.onclose = (event) => {
    document.getElementById('status-dot').className = 'dot disconnected';
    if (event.code === 1008) {
      document.getElementById('status-text').textContent = 'Auth failed — reload page';
      return;  // don't reconnect on auth failure
    }
    document.getElementById('status-text').textContent = 'Disconnected — reconnecting...';
    setTimeout(connectWS, 2000);
  };

  state.ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'message') {
      if (data.chat_identifier === state.chatId) {
        appendMessage(data);
        showLastStatus();
      } else if (!data.is_from_me) {
        const cid = data.chat_identifier;
        state.unread[cid] = (state.unread[cid] || 0) + 1;
        updateUnreadBadge(cid);
        updateTitle();
      }
      updateSidebarPreview(data);
    } else if (data.type === 'status_update') {
      if (data.chat_identifier === state.chatId) {
        updateLastSentStatus(data.status);
      }
    }
  };
}

function updateSidebarPreview(data) {
  const item = document.querySelector(`.chat-item[data-chat-id="${CSS.escape(data.chat_identifier)}"]`);
  if (item) {
    const preview = item.querySelector('.chat-item-preview');
    if (preview && data.text) {
      preview.textContent = data.text.substring(0, 80);
    }
  }
}

function updateUnreadBadge(chatId) {
  const item = document.querySelector(`.chat-item[data-chat-id="${CSS.escape(chatId)}"]`);
  if (!item) return;
  const count = state.unread[chatId] || 0;
  const badge = item.querySelector('.unread-badge');
  if (count > 0) {
    item.classList.add('unread');
    badge.textContent = count > 99 ? '99+' : count;
  } else {
    item.classList.remove('unread');
  }
}

function updateTitle() {
  const total = Object.values(state.unread).reduce((a, b) => a + b, 0);
  document.title = total > 0 ? `(${total}) iMessage Bridge` : 'iMessage Bridge';
}

// --- Chat selection ---
document.getElementById('chat-list').addEventListener('click', async (e) => {
  const item = e.target.closest('.chat-item');
  if (!item) return;

  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  item.classList.add('active');

  state.chatId = item.dataset.chatId;

  // Clear unread for this chat
  delete state.unread[state.chatId];
  updateUnreadBadge(state.chatId);
  updateTitle();
  state.chatStyle = parseInt(item.dataset.chatStyle) || 45;
  state.chatName = item.dataset.chatName;
  state.msgOffset = 0;
  state.hasMore = true;
  state.loadingMore = false;

  document.getElementById('chat-header').textContent = state.chatName;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('compose').style.display = 'flex';
  document.getElementById('send-btn').disabled = false;
  document.body.classList.add('chat-open');

  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML = '<div style="color:#555;text-align:center;padding:20px">Loading...</div>';

  const resp = await fetch(`/api/chats/${encodeURIComponent(state.chatId)}/messages`);
  const messages = await resp.json();

  state.msgOffset = messages.length;
  if (messages.length < 100) state.hasMore = false;

  messagesEl.innerHTML = '';
  messages.forEach(msg => appendMessage(msg));
  showLastStatus();
  messagesEl.scrollTop = messagesEl.scrollHeight;
});

// --- Send ---
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !state.chatId || !state.ws) return;

  state.ws.send(JSON.stringify({
    type: 'send',
    chat_identifier: state.chatId,
    chat_style: state.chatStyle,
    text: text,
  }));

  appendMessage({
    text: text,
    is_from_me: true,
    sender_id: 'me',
    timestamp: new Date().toISOString(),
  });

  input.value = '';
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

// --- Render ---
function createMessageElement(msg) {
  const div = document.createElement('div');
  div.className = `msg ${msg.is_from_me ? 'from-me' : 'from-them'}`;

  let html = '';

  if (!msg.is_from_me && state.chatStyle === 43 && msg.sender_id) {
    html += `<div class="msg-sender">${escapeHtml(msg.sender_id)}</div>`;
  }

  if (msg.text) {
    html += escapeHtml(msg.text);
  }

  if (msg.attachments && msg.attachments.length) {
    for (const att of msg.attachments) {
      if (!att.url) continue;
      const mime = att.mime_type || '';
      if (mime.startsWith('image/')) {
        html += `<img class="msg-img" src="${att.url}" alt="${escapeHtml(att.transfer_name)}" loading="lazy" onclick="window.open(this.src)">`;
      } else if (mime.startsWith('video/')) {
        html += `<video class="msg-img" src="${att.url}" controls preload="metadata"></video>`;
      } else {
        html += `<a class="msg-file" href="${att.url}" target="_blank" download>${escapeHtml(att.transfer_name)}</a>`;
      }
    }
  }

  if (msg.timestamp) {
    const d = new Date(msg.timestamp);
    const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    html += `<div class="msg-time">${time}</div>`;
  }

  if (msg.is_from_me && msg.status) {
    const labels = { read: 'Read', delivered: 'Delivered', sent: 'Sent' };
    const label = labels[msg.status] || '';
    if (label) {
      html += `<div class="msg-status" style="display:none">${label}</div>`;
    }
  }

  div.innerHTML = html;
  return div;
}

function appendMessage(msg) {
  const messagesEl = document.getElementById('messages');
  const div = createMessageElement(msg);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateLastSentStatus(status) {
  const labels = { read: 'Read', delivered: 'Delivered', sent: 'Sent' };
  const label = labels[status] || '';
  const sentMsgs = document.querySelectorAll('#messages .msg.from-me');
  if (sentMsgs.length === 0) return;
  const last = sentMsgs[sentMsgs.length - 1];
  let el = last.querySelector('.msg-status');
  if (el) {
    el.textContent = label;
  } else if (label) {
    el = document.createElement('div');
    el.className = 'msg-status';
    el.textContent = label;
    last.appendChild(el);
  }
  showLastStatus();
}

function showLastStatus() {
  // Like iMessage: only show status on the very last sent message
  document.querySelectorAll('#messages .msg-status').forEach(el => el.style.display = 'none');
  const sentMsgs = document.querySelectorAll('#messages .msg.from-me');
  if (sentMsgs.length > 0) {
    const last = sentMsgs[sentMsgs.length - 1];
    const status = last.querySelector('.msg-status');
    if (status) status.style.display = 'block';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// --- Infinite scroll ---
document.getElementById('messages').addEventListener('scroll', async function() {
  if (this.scrollTop > 50 || !state.hasMore || state.loadingMore || !state.chatId) return;
  state.loadingMore = true;

  // Save current scroll height to restore position after prepending
  const prevHeight = this.scrollHeight;

  const resp = await fetch(`/api/chats/${encodeURIComponent(state.chatId)}/messages?offset=${state.msgOffset}&limit=100`);
  const older = await resp.json();

  if (older.length === 0) {
    state.hasMore = false;
    state.loadingMore = false;
    return;
  }

  state.msgOffset += older.length;
  if (older.length < 100) state.hasMore = false;

  // Prepend older messages at the top
  const fragment = document.createDocumentFragment();
  older.forEach(msg => {
    const div = createMessageElement(msg);
    fragment.appendChild(div);
  });
  this.insertBefore(fragment, this.firstChild);

  // Restore scroll position so it doesn't jump
  this.scrollTop = this.scrollHeight - prevHeight;
  showLastStatus();
  state.loadingMore = false;
});

// --- Init ---
connectWS();
</script>
</body>
</html>
